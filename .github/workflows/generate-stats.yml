name: Generate Stats Cards

on:
  schedule:
    - cron: '3 0 * * *'
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: github
        with:
          USERNAME: zhangjunphy
          UTC_OFFSET: 8

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/
          git diff --staged --quiet || git commit -m "Update stats cards [skip ci]"
          git push
